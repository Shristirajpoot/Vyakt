<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Translate Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #content {
            margin: 20px;
            font-size: 18px;
        }
        select {
            padding: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>Translate Content</h1>
    
    <!-- Language Selection -->
    <select id="languageSelect">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
    </select>
    
    <div id="content">
        <p>This is a sample content that will be translated.</p>
    </div>

    <script>
        const apiKey = {{ google_translate_api_key|tojson }};
        const languageSelect = document.getElementById('languageSelect');
        const contentDiv = document.getElementById('content');

        // Function to translate content
        function translateContent(language) {
            if (!apiKey) {
                console.warn('GOOGLE_TRANSLATE_API_KEY is not set. Skipping translation.');
                return;
            }
            const textToTranslate = contentDiv.innerText; // Get the current content text
            const url = `https://translation.googleapis.com/language/translate/v2?key=${apiKey}`;

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    q: textToTranslate,
                    target: language
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data && data.data && data.data.translations) {
                    contentDiv.innerHTML = data.data.translations[0].translatedText; // Update content with translated text
                }
            })
            .catch(error => {
                console.error('Error translating content:', error);
            });
        }

        // Event listener for language change
        languageSelect.addEventListener('change', (event) => {
            const selectedLanguage = event.target.value;
            translateContent(selectedLanguage);
        });

        // Translate content when the page loads with default language
        translateContent('en'); // Default to English
    </script>

</body>
</html>
